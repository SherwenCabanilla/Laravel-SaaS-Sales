name: Funnel Builder Regression

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  funnel-builder-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: ${{ runner.os }}-php-8.4-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php -r "file_exists('database/database.sqlite') || touch('database/database.sqlite');"
          php artisan key:generate
          php artisan config:clear
          php artisan migrate --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          CACHE_STORE: file
          SESSION_DRIVER: file
          QUEUE_CONNECTION: sync

      - name: Code style check (Pint)
        run: php artisan pint --test

      - name: Funnel builder regression tests
        run: php artisan test --testsuite=Feature --filter="FunnelBuilderModuleTest|FunnelTemplateManagementTest"
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          CACHE_STORE: file
          SESSION_DRIVER: file
          QUEUE_CONNECTION: sync
